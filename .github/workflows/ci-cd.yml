name: FitPulse CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ─── 1. Test Backend ──────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fitpulse_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Test DB connection and seeding
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: fitpulse_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          cd backend
          python -c "
          import sys
          sys.path.insert(0, '.')
          from db import init_db, get_connection
          init_db()
          conn = get_connection()
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM workouts')
          count = cur.fetchone()[0]
          assert count >= 5, f'Expected 5 seeded workouts, got {count}'
          print(f'DB test passed: {count} workouts seeded')
          conn.close()
          "

      - name: Test routes import
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: fitpulse_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          cd backend
          python -c "
          import sys
          sys.path.insert(0, '.')
          from routes.workouts import handle_workouts
          from routes.stats import handle_stats
          print('All routes imported successfully')
          "

      - name: Test all API endpoints live
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: fitpulse_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          PORT: 8001
        run: |
          cd backend
          python server.py &
          SERVER_PID=$!
          sleep 4
          curl -sf http://localhost:8001/health
          curl -sf http://localhost:8001/api/workouts
          curl -sf http://localhost:8001/api/stats
          curl -sf -X POST http://localhost:8001/api/workouts \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Test","category":"Cardio","duration_minutes":30,"calories_burned":250,"workout_date":"2026-05-22"}'
          kill $SERVER_PID
          echo "All API endpoints passed"

  # ─── 2. Test Frontend Build ───────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Verify build output exists
        run: |
          test -f frontend/dist/index.html
          echo "Frontend build verified"

  # ─── 3. Build Docker Images ───────────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: fitpulse-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: fitpulse-frontend:ci
          build-args: VITE_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker build complete
        run: echo "Both Docker images built successfully"

  # ─── 4. Push Images to Registry (main only) ──────────────────────────────────
  push-images:
    name: Push Images to Registry
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner name
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/fitpulse-backend:latest
            ghcr.io/${{ steps.owner.outputs.name }}/fitpulse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/fitpulse-frontend:latest
            ghcr.io/${{ steps.owner.outputs.name }}/fitpulse-frontend:${{ github.sha }}
          build-args: VITE_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image URLs
        run: |
          echo "Pushed successfully:"
          echo "  ghcr.io/${{ steps.owner.outputs.name }}/fitpulse-backend:latest"
          echo "  ghcr.io/${{ steps.owner.outputs.name }}/fitpulse-frontend:latest"